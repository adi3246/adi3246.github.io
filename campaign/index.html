<script>

function getParam(name) {
  const url = new URL(window.location.href);
  return url.searchParams.get(name);
}

const ref = getParam("ref_code") || "";

const androidApp = "airo://campaign?ref_code=" + ref;
const playStore = "https://play.google.com/store/apps/details?id=my.airo&referrer=airo_code%3D" + ref;
const iosStore = "https://apps.apple.com/us/app/airo-investment-manager/id1518165366";

function openApp(){

  const userAgent = navigator.userAgent || navigator.vendor;

  if (/android/i.test(userAgent)) {

    window.location = androidApp;

    setTimeout(function(){
        window.location = playStore;
    }, 2000);

  }
  else if (/iPad|iPhone|iPod/.test(userAgent)) {

    window.location = iosStore;

  } 
  else {
    window.location = "https://www.airo.my";
  }
}

window.onload = openApp;

</script>
